name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create release entry with generated notes
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          body: |
            This release includes the latest NAM Lab changes in this tag. See the generated release notes below for the commit-level summary.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run package:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.exe
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Linux AppImage
        run: npm run package:linux

      - name: Upload Linux release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build renderer and main
        run: npm run build

      - name: Package universal app (unpacked only, no DMG yet)
        run: npx electron-builder --mac dir --universal --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Ad-hoc sign the universal app
        run: |
          APP=$(find release -name "NAM Lab.app" -maxdepth 3 | head -1)
          echo "Signing: $APP"
          codesign --deep --force --sign - "$APP"
          codesign --verify --deep --strict "$APP" && echo "Signature OK"

      - name: Create DMG from signed universal app
        run: npx electron-builder --mac dmg --universal --publish never --prepackaged "release/mac-universal"
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Mac release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
